version: '1.0'
name: macos-build-pipeline
displayName: macOS 自动打包
stages:
  - stage:
    name: build
    displayName: 构建 macOS 安装包
    steps:
      - step: build@custom
        name: build_macos
        displayName: 编译并打包 macOS DMG
        # 使用 macOS 构建环境
        platform: macos
        # 使用 JDK 17
        jdkVersion: 17
        # 构建命令
        commands:
          - echo "开始编译项目..."
          - chmod +x mvnw
          - ./mvnw clean package -DskipTests
          - echo "编译完成，开始打包 DMG..."
          - jpackage --input target \
                     --name "BatchRenameTool" \
                     --main-jar batchfile_app-0.0.1-SNAPSHOT.jar \
                     --main-class com.rt.batchfile_app.BatchfileAppApplication \
                     --dest target/dist \
                     --type dmg \
                     --app-version 1.0.0 \
                     --vendor RT \
                     --java-options "--add-modules" \
                     --java-options "javafx.controls,javafx.fxml"
          - echo "打包完成！"
          - ls -lh target/dist/*.dmg
        # 构建产物
        artifacts:
          - name: DMG_ARTIFACT
            path:
              - ./target/dist/*.dmg
triggers:
  push:
    branches:
      include:
        - master
        - main
