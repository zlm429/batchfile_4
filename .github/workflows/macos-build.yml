name: Build & Package (Windows EXE + macOS Intel DMG)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: '17'
  JAVAFX_VERSION: '17.0.2'
  APP_NAME: "BatchRenameTool"
  MAIN_CLASS: "com.rt.batchfile_app.BatchfileAppApplication"
  MAIN_JAR: "batchfile_app-0.0.1-SNAPSHOT.jar"

jobs:
  build-macos-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Intel JavaFX SDK
        run: |
          curl -L "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_osx-x64_bin-sdk.zip" -o javafx.zip
          unzip -q javafx.zip -d /tmp
          mv /tmp/javafx-sdk-${{ env.JAVAFX_VERSION }} /tmp/javafx-sdk
          echo "JAVAFX_PATH=/tmp/javafx-sdk/lib" >> $GITHUB_ENV

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Jlink Runtime (Intel)
        run: |
          jlink \
            --module-path "$JAVAFX_PATH" \
            --add-modules java.base,java.desktop,javafx.controls,javafx.fxml,javafx.graphics,javafx.base,javafx.swing \
            --output target/runtime \
            --strip-debug --no-man-pages --no-header-files --compress=2

      - name: Package DMG (Intel)
        run: |
          export TMPDIR=/tmp
          mkdir -p target/dist
          jpackage \
            --input target \
            --name "$APP_NAME" \
            --main-jar "$MAIN_JAR" \
            --main-class "$MAIN_CLASS" \
            --dest target/dist \
            --type dmg \
            --app-version 1.0.0 \
            --vendor "RT" \
            --mac-package-identifier "com.rt.batchtool" \
            --runtime-image target/runtime \
            --java-options "-Xmx2G -Dfile.encoding=UTF-8 -Dprism.forceGPU=true"

      - name: Adhoc Sign
        run: |
          sudo codesign --force --deep --sign - target/dist/*.app
          sudo codesign --force --deep --sign - target/dist/*.dmg

      - name: Upload macOS Intel Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: BatchRenameTool-macOS-Intel
          path: target/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Windows JavaFX SDK
        run: |
          curl -L "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_windows-x64_bin-sdk.zip" -o javafx.zip
          unzip -q javafx.zip -d C:\tmp
          mv C:\tmp\javafx-sdk-${{ env.JAVAFX_VERSION }} C:\tmp\javafx-sdk
          echo "JAVAFX_PATH=C:\tmp\javafx-sdk\lib" >> $env:GITHUB_ENV

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Jlink Runtime (Windows)
        run: |
          jlink `
            --module-path "$env:JAVAFX_PATH" `
            --add-modules java.base,java.desktop,javafx.controls,javafx.fxml,javafx.graphics,javafx.base,javafx.swing `
            --output target\runtime `
            --strip-debug --no-man-pages --no-header-files --compress=2

      - name: Package EXE
        run: |
          jpackage `
            --input target `
            --name "$env:APP_NAME" `
            --main-jar "$env:MAIN_JAR" `
            --main-class "$env:MAIN_CLASS" `
            --dest target\dist `
            --type exe `
            --app-version 1.0.0 `
            --vendor "RT" `
            --runtime-image target\runtime `
            --java-options "-Xmx2G -Dfile.encoding=UTF-8" `
            --win-shortcut --win-menu --win-console
        shell: pwsh

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: BatchRenameTool-Windows
          path: target\dist\*.exe
