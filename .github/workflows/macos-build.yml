name: Build & Package (Windows + macOS)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download JavaFX
        run: |
          curl -L "https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_osx-x64_bin-sdk.zip" -o javafx.zip
          unzip -q javafx.zip -d /tmp
          mv /tmp/javafx-sdk-17.0.2 /tmp/javafx-sdk
          echo "JAVAFX_PATH=/tmp/javafx-sdk/lib" >> $GITHUB_ENV
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests
      - name: Package DMG
        run: |
          mkdir -p target/dist
          jpackage \
            --input target \
            --name "BatchRenameTool" \
            --main-jar "batchfile_app-0.0.1-SNAPSHOT.jar" \
            --main-class "com.rt.batchfile_app.BatchfileAppApplication" \
            --dest target/dist \
            --type dmg \
            --app-version 1.0.0 \
            --vendor "RT" \
            --mac-package-identifier "com.rt.batchtool" \
            --module-path "$JAVAFX_PATH" \
            --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base,javafx.swing,javafx.media \
            --java-options "-Xmx2G -Dfile.encoding=UTF-8 -Dprism.forceGPU=true -Djava.awt.headless=false"
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: BatchRenameTool-macOS
          path: target/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Download JavaFX
        run: |
          curl -L "https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_windows-x64_bin-sdk.zip" -o javafx.zip
          unzip -q javafx.zip -d C:\tmp
          mv C:\tmp\javafx-sdk-17.0.2 C:\tmp\javafx-sdk
          echo "JAVAFX_PATH=C:\tmp\javafx-sdk\lib" >> $env:GITHUB_ENV
      - name: Build with Maven
        run: ./mvnw clean package -DskipTests
      - name: Package EXE
        run: |
          jpackage `
            --input target `
            --name "BatchRenameTool" `
            --main-jar "batchfile_app-0.0.1-SNAPSHOT.jar" `
            --main-class "com.rt.batchfile_app.BatchfileAppApplication" `
            --dest target\dist `
            --type exe `
            --app-version 1.0.0 `
            --vendor "RT" `
            --module-path "$env:JAVAFX_PATH" `
            --add-modules javafx.controls,javafx.fxml,javafx.graphics,javafx.base,javafx.swing,javafx.media `
            --java-options "-Xmx2G -Dfile.encoding=UTF-8" `
            --win-shortcut `
            --win-menu `
            --win-per-user-install
        shell: pwsh
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: BatchRenameTool-Windows
          path: target/dist/*.exe
