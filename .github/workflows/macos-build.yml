name: Build & Package (Windows + macOS)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAVA_VERSION: '17'
  JAVAFX_VERSION: '17.0.2'
  APP_NAME: "BatchRenameTool"
  MAIN_CLASS: "com.rt.batchfile_app.BatchfileAppApplication"
  MAIN_JAR: "batchfile_app-0.0.1-SNAPSHOT.jar"

jobs:
  build-macos:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Download JavaFX ${{ env.JAVAFX_VERSION }} (macOS ${{ matrix.arch }})
        run: |
          ARCH=${{ matrix.arch }}
          URL="https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_osx-${ARCH}_bin-sdk.zip"
          curl -L "$URL" -o javafx.zip
          unzip -q javafx.zip -d /tmp
          mv /tmp/javafx-sdk-${{ env.JAVAFX_VERSION }} /tmp/javafx-sdk
          echo "JAVAFX_PATH=/tmp/javafx-sdk/lib" >> $GITHUB_ENV

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Jlink Runtime (macOS ${{ matrix.arch }})
        run: |
          jlink \
            --module-path "$JAVAFX_PATH" \
            --add-modules \
              java.base,java.desktop,java.xml,java.logging,java.naming, \
              javafx.controls,javafx.fxml,javafx.graphics,javafx.base, \
              javafx.swing,javafx.media,javafx.web \
            --output target/runtime-macos-${{ matrix.arch }} \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress=2

      - name: Package DMG (macOS ${{ matrix.arch }})
        run: |
          mkdir -p target/dist
          jpackage \
            --input target \
            --name "${{ env.APP_NAME }}" \
            --main-jar "${{ env.MAIN_JAR }}" \
            --main-class "${{ env.MAIN_CLASS }}" \
            --dest target/dist \
            --type dmg \
            --app-version 1.0.0 \
            --vendor "RT" \
            --mac-package-identifier "com.rt.batchtool" \
            --runtime-image target/runtime-macos-${{ matrix.arch }} \
            --java-options "-Xmx2G -Dfile.encoding=UTF-8 -Dprism.forceGPU=true"

      - name: Fix permissions & codesign (adhoc)
        run: |
          sudo chmod -R 755 target/dist
          sudo codesign --force --deep --sign - target/dist/*.dmg

      - name: Upload macOS ${{ matrix.arch }} Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ${{ env.APP_NAME }}-macOS-${{ matrix.arch }}
          path: target/dist/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Download JavaFX ${{ env.JAVAFX_VERSION }} (Windows x64)
        run: |
          curl -L "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_windows-x64_bin-sdk.zip" -o javafx.zip
          unzip -q javafx.zip -d C:\tmp
          mv C:\tmp\javafx-sdk-${{ env.JAVAFX_VERSION }} C:\tmp\javafx-sdk
          echo "JAVAFX_PATH=C:\tmp\javafx-sdk\lib" >> $env:GITHUB_ENV

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Jlink Runtime (Windows x64)
        run: |
          jlink `
            --module-path "$env:JAVAFX_PATH" `
            --add-modules `
              java.base,java.desktop,java.xml,java.logging,java.naming, `
              javafx.controls,javafx.fxml,javafx.graphics,javafx.base, `
              javafx.swing,javafx.media,javafx.web `
            --output target\runtime-windows `
            --strip-debug `
            --no-man-pages `
            --no-header-files `
            --compress=2

      - name: Package EXE (Windows x64)
        run: |
          jpackage `
            --input target `
            --name "${{ env.APP_NAME }}" `
            --main-jar "${{ env.MAIN_JAR }}" `
            --main-class "${{ env.MAIN_CLASS }}" `
            --dest target\dist `
            --type exe `
            --app-version 1.0.0 `
            --vendor "RT" `
            --runtime-image target\runtime-windows `
            --java-options "-Xmx2G -Dfile.encoding=UTF-8" `
            --win-shortcut `
            --win-menu `
            --win-console
        shell: pwsh

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ${{ env.APP_NAME }}-Windows
          path: target\dist\*.exe
