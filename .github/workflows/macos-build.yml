name: Build Windows EXE (Pom-First)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # 关键：直接调用 Maven 命令，和你本地一样
      - name: Build & Package
        run: |
          ./mvnw clean package jpackage:jpackage -DskipTests

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BatchRenameTool-Windows
          path: target/dist/*.exe
