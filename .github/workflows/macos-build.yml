name: Build & Package (Windows EXE + macOS Intel DMG)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ##############################################################################
  # macOS Intel (macos-15-intel) → DMG
  ##############################################################################
  build-macos-intel:
    runs-on: macos-15-intel

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Intel JavaFX SDK
        run: |
          curl -L https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_osx-x64_bin-sdk.zip -o javafx.zip
          unzip -q javafx.zip -d /tmp/
          mv /tmp/javafx-sdk-17.0.2 /tmp/javafx-sdk
          echo "JAVAFX_PATH=/tmp/javafx-sdk/lib" >> $GITHUB_ENV

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Package DMG (Intel)
        run: |
          export TMPDIR=/tmp/jpkg
          mkdir -p $TMPDIR
          rm -rf target/dist
          mkdir -p target/dist

          jpackage --input target \
                   --name "BatchRenameTool" \
                   --main-jar batchfile_app-0.0.1-SNAPSHOT.jar \
                   --main-class com.rt.batchfile_app.BatchfileAppApplication \
                   --dest target/dist \
                   --type dmg \
                   --app-version 1.0.0 \
                   --vendor RT \
                   --mac-package-identifier com.rt.batchtool \
                   --module-path ${{ env.JAVAFX_PATH }} \
                   --add-modules javafx.controls,javafx.fxml \
                   --java-options "-Dfile.encoding=UTF-8"

      - name: Upload DMG
        uses: actions/upload-artifact@v4.4.3
        with:
          name: BatchRenameTool-macOS-Intel
          path: target/dist/*.dmg
          retention-days: 30

  ##############################################################################
  # Windows → EXE 安装包（自带 JRE，用户不用装 Java）
  ##############################################################################
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Windows JavaFX SDK
        run: |
          curl -L https://download2.gluonhq.com/openjfx/17.0.2/openjfx-17.0.2_windows-x64_bin-sdk.zip -o javafx.zip
          unzip javafx.zip -d C:\tmp
          mv C:\tmp\javafx-sdk-17.0.2 C:\tmp\javafx-sdk
          echo "JAVAFX_PATH=C:\tmp\javafx-sdk\lib" >> $env:GITHUB_ENV

      - name: Build with Maven
        run: |
          ./mvnw clean package -DskipTests

      - name: Package Windows EXE
        run: |
          jpackage --input target `
                   --name "BatchRenameTool" `
                   --main-jar batchfile_app-0.0.1-SNAPSHOT.jar `
                   --main-class com.rt.batchfile_app.BatchfileAppApplication `
                   --dest target\dist `
                   --type exe `
                   --app-version 1.0.0 `
                   --vendor RT `
                   --module-path $env:JAVAFX_PATH `
                   --add-modules javafx.controls,javafx.fxml `
                   --java-options "-Dfile.encoding=UTF-8" `
                   --win-shortcut `
                   --win-menu
        shell: pwsh

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: BatchRenameTool-Windows-EXE
          path: target/dist/*.exe
          retention-days: 30
