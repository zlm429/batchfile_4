name: Build Windows EXE (Fixed Graphics)

on:
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven (with jpackage)
        run: ./mvnw clean package jpackage:jpackage -DskipTests

      - name: Upload EXE
        uses: actions/upload-artifact@v4.4.3
        with:
          name: BatchRenameTool-Windows
          path: target/dist/*.exe
